<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARAS Admin</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; background: #0A0A0F; color: #E8E8EC; padding: 40px 24px; }
h1 { color: #C9A84C; font-size: 24px; margin-bottom: 24px; }
h2 { font-size: 18px; margin: 24px 0 12px; color: #C9A84C; }
.card { background: rgba(255,255,255,0.03); border: 1px solid rgba(201,168,76,0.1); border-radius: 12px; padding: 24px; margin-bottom: 20px; max-width: 800px; }
label { display: block; font-size: 13px; color: #8888A0; margin-bottom: 4px; margin-top: 12px; }
input, textarea { width: 100%; padding: 10px 14px; background: #1A1A26; border: 1px solid rgba(201,168,76,0.15); border-radius: 8px; color: #E8E8EC; font-size: 14px; font-family: inherit; outline: none; }
input:focus, textarea:focus { border-color: #C9A84C; }
textarea { min-height: 80px; resize: vertical; }
.row { display: flex; gap: 12px; }
.row > * { flex: 1; }
.btn { background: #C9A84C; color: #0A0A0F; border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 16px; }
.btn:hover { opacity: 0.9; }
.btn-outline { background: transparent; border: 1px solid #C9A84C; color: #C9A84C; margin-left: 8px; }
.msg { padding: 12px; border-radius: 8px; margin-top: 12px; display: none; }
.msg.ok { background: rgba(76,217,100,0.1); border: 1px solid rgba(76,217,100,0.3); color: #4CD964; display: block; }
.msg.err { background: rgba(255,59,48,0.1); border: 1px solid rgba(255,59,48,0.3); color: #FF3B30; display: block; }
.login { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; }
.login .card { width: 400px; max-width: 100%; }
.login h1 { text-align: center; }
.hidden { display: none; }
.service-item { display: flex; gap: 8px; margin-bottom: 8px; align-items: start; }
.service-item input { flex: 1; }
.service-item button { background: rgba(255,59,48,0.2); border: 1px solid rgba(255,59,48,0.3); color: #FF3B30; padding: 8px 12px; border-radius: 6px; cursor: pointer; margin-top: 12px; }
.add-btn { background: none; border: 1px dashed rgba(201,168,76,0.3); color: #C9A84C; padding: 8px 16px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 8px; font-size: 13px; }
.add-btn:hover { border-color: #C9A84C; }
</style>
</head>
<body>
<div id="loginView" class="login">
  <div class="card">
    <h1>ARAS Admin</h1>
    <label>Password</label>
    <input type="password" id="loginPass" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" onclick="doLogin()" style="width:100%">Login</button>
    <div id="loginMsg" class="msg"></div>
  </div>
</div>

<div id="adminView" class="hidden">
  <h1>ARAS Admin Panel</h1>

  <div class="card">
    <h2>Company Info</h2>
    <label>Company Name</label>
    <input id="companyName">
    <label>Short Name</label>
    <input id="shortName">
    <label>Tagline</label>
    <input id="tagline">
    <div class="row">
      <div><label>Phone</label><input id="phone"></div>
      <div><label>Email</label><input id="email"></div>
    </div>
    <div class="row">
      <div><label>WhatsApp</label><input id="whatsapp"></div>
      <div><label>Address</label><input id="address"></div>
    </div>
  </div>

  <div class="card">
    <h2>SEO</h2>
    <label>Page Title</label>
    <input id="seoTitle">
    <label>Meta Description</label>
    <textarea id="seoDesc"></textarea>
    <label>Google Analytics ID</label>
    <input id="gaId" placeholder="G-XXXXXXXXXX">
  </div>

  <div class="card">
    <h2>Hero Section</h2>
    <label>Heading 1</label><input id="heroH1">
    <label>Heading 2</label><input id="heroH2">
    <label>Tagline</label><input id="heroTagline">
    <label>Subtitle</label><textarea id="heroSubtitle" rows="2"></textarea>
  </div>

  <div class="card">
    <h2>Services</h2>
    <div id="servicesList"></div>
    <button class="add-btn" onclick="addService()">+ Add Service</button>
  </div>

  <div class="card">
    <h2>Divisions</h2>
    <div id="divisionsList"></div>
    <button class="add-btn" onclick="addDivision()">+ Add Division</button>
  </div>

  <div class="card">
    <h2>Clients</h2>
    <div id="clientsList"></div>
    <button class="add-btn" onclick="addClient()">+ Add Client</button>
  </div>

  <button class="btn" onclick="saveConfig()">Save Changes</button>
  <button class="btn btn-outline" onclick="loadConfig()">Discard Changes</button>
  <div id="saveMsg" class="msg"></div>
</div>

<script>
const PASS = 'admin';
let config = null;

function doLogin() {
  const p = document.getElementById('loginPass').value;
  if (p === PASS) {
    document.getElementById('loginView').classList.add('hidden');
    document.getElementById('adminView').classList.remove('hidden');
    loadConfig();
  } else {
    document.getElementById('loginMsg').textContent = 'Incorrect password';
    document.getElementById('loginMsg').className = 'msg err';
  }
}

async function loadConfig() {
  try {
    const r = await fetch('/data/config.json');
    config = await r.json();
    populateForm();
  } catch (e) {
    showMsg('Failed to load config', true);
  }
}

function populateForm() {
  if (!config) return;
  document.getElementById('companyName').value = config.company.name;
  document.getElementById('shortName').value = config.company.shortName;
  document.getElementById('tagline').value = config.company.tagline;
  document.getElementById('phone').value = config.company.phone;
  document.getElementById('email').value = config.company.email;
  document.getElementById('whatsapp').value = config.company.whatsapp;
  document.getElementById('address').value = config.company.address;
  document.getElementById('seoTitle').value = config.seo.title;
  document.getElementById('seoDesc').value = config.seo.description;
  document.getElementById('gaId').value = config.seo.gaId || '';
  document.getElementById('heroH1').value = config.hero.heading1;
  document.getElementById('heroH2').value = config.hero.heading2;
  document.getElementById('heroTagline').value = config.hero.tagline;
  document.getElementById('heroSubtitle').value = config.hero.subtitle;
  renderServices();
  renderDivisions();
  renderClients();
}

function renderServices() {
  const el = document.getElementById('servicesList');
  el.innerHTML = config.services.map((s, i) => `
    <div class="service-item">
      <input value="${s.title.replace(/"/g,'&quot;')}" onchange="editService(${i},'title',this.value)" placeholder="Service name">
      <input value="${s.desc.replace(/"/g,'&quot;')}" onchange="editService(${i},'desc',this.value)" placeholder="Description">
      <button onclick="removeService(${i})">&times;</button>
    </div>
  `).join('');
}

function editService(i, field, val) { config.services[i][field] = val; }
function removeService(i) { config.services.splice(i,1); renderServices(); }
function addService() { config.services.push({title:'New Service',desc:'Description'}); renderServices(); }

function renderDivisions() {
  const el = document.getElementById('divisionsList');
  el.innerHTML = config.divisions.map((d, i) => `
    <div class="service-item">
      <input value="${d.replace(/"/g,'&quot;')}" onchange="config.divisions[${i}]=this.value">
      <button onclick="config.divisions.splice(${i},1);renderDivisions()">&times;</button>
    </div>
  `).join('');
}
function addDivision() { config.divisions.push('New Division'); renderDivisions(); }

function renderClients() {
  const el = document.getElementById('clientsList');
  el.innerHTML = config.clients.map((c, i) => `
    <div class="service-item">
      <input value="${c.replace(/"/g,'&quot;')}" onchange="config.clients[${i}]=this.value">
      <button onclick="config.clients.splice(${i},1);renderClients()">&times;</button>
    </div>
  `).join('');
}
function addClient() { config.clients.push('New Client'); renderClients(); }

function collectForm() {
  config.company.name = document.getElementById('companyName').value;
  config.company.shortName = document.getElementById('shortName').value;
  config.company.tagline = document.getElementById('tagline').value;
  config.company.phone = document.getElementById('phone').value;
  config.company.email = document.getElementById('email').value;
  config.company.whatsapp = document.getElementById('whatsapp').value;
  config.company.address = document.getElementById('address').value;
  config.seo.title = document.getElementById('seoTitle').value;
  config.seo.description = document.getElementById('seoDesc').value;
  config.seo.gaId = document.getElementById('gaId').value;
  config.hero.heading1 = document.getElementById('heroH1').value;
  config.hero.heading2 = document.getElementById('heroH2').value;
  config.hero.tagline = document.getElementById('heroTagline').value;
  config.hero.subtitle = document.getElementById('heroSubtitle').value;
}

async function saveConfig() {
  collectForm();
  const p = document.getElementById('loginPass').value;
  try {
    const r = await fetch('/api/admin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: p, config })
    });
    const d = await r.json();
    showMsg(d.success ? 'Saved successfully! Deploy the site to see changes.' : d.error, !d.success);
  } catch (e) {
    showMsg('Save failed: ' + e.message, true);
  }
}

function showMsg(text, isError) {
  const el = document.getElementById('saveMsg');
  el.textContent = text;
  el.className = 'msg ' + (isError ? 'err' : 'ok');
  setTimeout(() => el.className = 'msg', 5000);
}
</script>
</body>
</html>
